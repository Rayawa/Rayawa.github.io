<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Home | Ray Chen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../static/css/common.css">
  <style>
    .verify-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #0b1325 0%, #1b2f50 100%);
    }

    .verify-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 3rem;
      max-width: 600px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .verify-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .verify-header h1 {
      color: var(--light);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .verify-header p {
      color: var(--gray-light);
      font-size: 1rem;
    }

    .verify-instruction {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .verify-instruction h3 {
      color: var(--primary);
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .verify-instruction p {
      color: var(--gray-light);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .question-list {
      margin-bottom: 2.5rem;
    }

    .question-item {
      margin-bottom: 1.5rem;
    }

    .question-item label {
      display: block;
      color: var(--light);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .question-item input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: var(--light);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: var(--transition);
    }

    .question-item input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .question-item input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .verify-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .verify-btn {
      padding: 0.875rem 2rem;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .verify-btn-primary {
      background: var(--primary);
      color: white;
    }

    .verify-btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .verify-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--light);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .verify-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .verify-btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .verify-btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
      transform: translateY(-2px);
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1.5rem;
      color: #f87171;
      text-align: center;
      display: none;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1.5rem;
      color: #34d399;
      text-align: center;
      display: none;
    }

    @media (max-width: 768px) {
      .verify-card {
        padding: 2rem;
      }
      
      .verify-header h1 {
        font-size: 1.75rem;
      }
      
      .verify-actions {
        flex-direction: column;
      }
      
      .verify-btn {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .verify-container {
        padding: 1rem;
      }
      
      .verify-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="verify-container">
    <div class="verify-card">
      <div class="verify-header">
        <h1>身份验证</h1>
        <p>为了保护隐私，请回答以下任意两个问题</p>
      </div>

      <div class="verify-instruction">
        <h3>验证说明</h3>
        <p>请从以下7个问题中选择任意2个进行回答，答对即可访问页面。英文答案不区分大小写，其他答案需完全匹配。</p>
      </div>

      <div class="question-list">
        <div class="question-item">
          <label for="q1">1. 英语老师的英文名叫做？</label>
          <input type="text" id="q1" placeholder="请输入答案">
        </div>

        <div class="question-item">
          <label for="q2">2. 这一届的年级主任叫做？</label>
          <input type="text" id="q2" placeholder="请输入答案">
        </div>

        <div class="question-item">
          <label for="q3">3. 谁扮演了《谁杀死了周日》的周日？</label>
          <input type="text" id="q3" placeholder="请输入答案">
        </div>

        <div class="question-item">
          <label for="q4">4. 游学支教活动的官方名称是？</label>
          <input type="text" id="q4" placeholder="请输入答案">
        </div>

        <div class="question-item">
          <label for="q5">5. 高三壮行仪式去了_____长城？</label>
          <input type="text" id="q5" placeholder="请输入答案">
        </div>

        <div class="question-item">
          <label for="q6">6. 班里最高的人是？</label>
          <input type="text" id="q6" placeholder="请输入答案">
        </div>

        <div class="question-item">
          <label for="q7">7. 谁在班里拥有了"波哥"的代号？</label>
          <input type="text" id="q7" placeholder="请输入答案">
        </div>
      </div>

      <div class="verify-actions">
        <button type="button" class="verify-btn verify-btn-primary" id="submitBtn">
          <i class="fas fa-paper-plane"></i> Submit
        </button>
        <button type="button" class="verify-btn verify-btn-secondary" id="clearBtn">
          <i class="fas fa-eraser"></i> Clear
        </button>
        <button type="button" class="verify-btn verify-btn-danger" id="homeBtn">
          <i class="fas fa-home"></i> Back to Home
        </button>
      </div>

      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i> 验证失败：请确保至少答对2个问题（当前答对了<span id="correctCount">0</span>个）
      </div>

      <div class="success-message" id="successMessage">
        <i class="fas fa-check-circle"></i> 验证成功！正在跳转...
      </div>
    </div>
  </div>

  <script>window.SITE_I18N={"zh": {}, "en": {"refresh": "Refresh page", "top": "Back to top", "dotLabel": "Go to slide {n}", "sending": "Sending...", "sent": "Message sent successfully. I will reply soon.", "sendFailed": "Failed to send. Please try again later.", "pageTitle": "Home | Ray Chen", "nav.home": "Home", "nav.about": "About Me", "nav.projects": "Projects", "nav.gallery": "Photography", "nav.contact": "Contact"}, "fr": {}};window.FOOTER_I18N={"zh": {}, "en": {"nav": {"home": "Home", "about": "About Me", "projects": "Projects", "gallery": "Photography", "contact": "Contact"}, "project": {"hmdb": {"title": "HmDashboard"}, "bio": {"title": "Biology Projects"}, "spm": {"title": "Sweet Potato Mod"}, "ohos": {"title": "OpenHarmony Hi3861"}, "signal": {"title": "Measurement of Weak Electrical Signals"}}, "footer": {"description": "Ray汐 / 清霁Ray / Rayawa<br>Everything is possible by code.", "quick": "Quick Links", "projects": "Projects", "thanks": "Acknowledgements", "thanksLink": "View Acknowledgements", "copy": "&copy; 2026 Ray Chen. All rights reserved."}}, "fr": {}};(function(){var l=document.documentElement.lang||"zh-CN";var lc=l.startsWith("en")?"en":l.startsWith("fr")?"fr":"zh";localStorage.setItem("rayawa_locale",lc);})();</script>
    <script src="../../static/js/particles.min.js"></script>
    <script src="../../static/js/common.js"></script>
  <script>
    // 安全存储的答案（使用字符编码混淆）
    function getAnswers() {
      // 使用字符编码数组存储答案，增加查看难度
      const answerCodes = [
        [118, 105, 118, 105, 97, 110],  // 'vivian'
        [233, 135, 136, 231, 150, 139], // '杜珊' - UTF-8编码
        [229, 188, 132, 230, 137, 169, 232, 138, 177], // '傅才艺'
        [228, 185, 166, 229, 140, 151, 231, 154, 132, 230, 136, 144, 233, 149, 183], // '书包的成长'
        [233, 135, 135, 229, 177, 130, 229, 178, 131], // '金山岭'
        [228, 184, 147, 229, 174, 182, 230, 150, 176], // '万宇新'
        [233, 146, 162, 228, 184, 128, 233, 178, 156]  // '钟一鸣'
      ];
      
      // 将字符编码转换回字符串
      return answerCodes.map(codes => {
        return String.fromCharCode(...codes);
      });
    }
    
    const answers = {
      q1: getAnswers()[0],
      q2: getAnswers()[1],
      q3: getAnswers()[2],
      q4: getAnswers()[3],
      q5: getAnswers()[4],
      q6: getAnswers()[5],
      q7: getAnswers()[6]
    };

    // 获取目标页面参数
    const urlParams = new URLSearchParams(window.location.search);
    const targetPage = urlParams.get('target') || 'graduation.html';

    // 检查是否已经通过验证
    function checkVerification() {
      const verified = localStorage.getItem(`verified_${targetPage}`);
      return verified === 'true';
    }

    // 验证答案
    function validateAnswers() {
      let correctCount = 0;
      let answeredCount = 0;
      
      for (let i = 1; i <= 7; i++) {
        const input = document.getElementById(`q${i}`);
        const userAnswer = input.value.trim();
        const correctAnswer = answers[`q${i}`];
        
        if (userAnswer) {
          answeredCount++;
          // 对于英文答案（q1），不区分大小写
          if (i === 1) {
            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
              correctCount++;
              console.log(`问题${i}回答正确: ${userAnswer} (不区分大小写)`);
            } else {
              console.log(`问题${i}回答错误: ${userAnswer} ≠ ${correctAnswer}`);
            }
          } else {
            // 其他答案需要完全匹配
            if (userAnswer === correctAnswer) {
              correctCount++;
              console.log(`问题${i}回答正确: ${userAnswer}`);
            } else {
              console.log(`问题${i}回答错误: ${userAnswer} ≠ ${correctAnswer}`);
            }
          }
        }
      }
      
      console.log(`总计: 回答了${answeredCount}题, 正确${correctCount}题`);
      return correctCount;
    }

    // 清空所有输入
    function clearAllInputs() {
      for (let i = 1; i <= 7; i++) {
        document.getElementById(`q${i}`).value = '';
      }
      hideMessages();
    }

    // 显示错误消息
    function showError() {
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    // 显示成功消息
    function showSuccess() {
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      
      errorMsg.style.display = 'none';
      successMsg.style.display = 'block';
    }

    // 隐藏所有消息
    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }

    // Submit
    function submitVerification() {
      const correctCount = validateAnswers();
      
      // 更新错误消息中的正确计数
      document.getElementById('correctCount').textContent = correctCount;
      
      if (correctCount >= 2) {
        // 验证成功
        showSuccess();
        
        // 存储验证状态
        localStorage.setItem(`verified_${targetPage}`, 'true');
        
        // 1.5秒后跳转
        setTimeout(() => {
          window.location.href = targetPage;
        }, 1500);
      } else {
        // 验证失败
        showError();
      }
    }

    // 事件监听
    document.addEventListener('DOMContentLoaded', function() {
      // 如果已经通过验证，直接跳转
      if (checkVerification()) {
        window.location.href = targetPage;
        return;
      }

      // 提交按钮
      document.getElementById('submitBtn').addEventListener('click', submitVerification);
      
      // 清空按钮
      document.getElementById('clearBtn').addEventListener('click', clearAllInputs);
      
      // Back to Home按钮
      document.getElementById('homeBtn').addEventListener('click', function() {
        window.location.href = '../index.html';
      });
      
      // 输入框回车提交
      for (let i = 1; i <= 7; i++) {
        document.getElementById(`q${i}`).addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            submitVerification();
          }
        });
      }
    });
  </script>
</body>
</html>
