  <div id="particles-js"></div>
  <main class="page">
    <section class="hero-card">
      <h1 data-i18n="title"><!-- i18n: page title --></h1>
      <p data-i18n="desc"><!-- i18n: page description --></p>
    </section>

    <section class="pcr-lab">
      <div class="section-header">
        <h2 data-i18n="pcrLab.title"><!-- i18n: pcr lab title --></h2>
        <p data-i18n="pcrLab.subtitle"><!-- i18n: pcr lab subtitle --></p>
      </div>
      <div class="pcr-content">
        <div class="pcr-result">
          <div class="gel-display">
            <div class="display-frame">
              <img src="../static/resources/bio/pcr.jpg" alt="PCR凝胶电泳结果" loading="lazy">
              <div class="display-overlay">
                <div class="result-text">
                  <i class="fas fa-dna"></i>
                  <span data-i18n="pcrResult.text"><!-- i18n: pcr result text --></span>
                </div>
              </div>
            </div>
            <div class="gel-caption" data-i18n="pcrResult.caption"><!-- i18n: pcr result caption --></div>
          </div>
        </div>
        <div class="pcr-docs">
          <div class="doc-card">
            <div class="doc-icon">
              <i class="fas fa-drafting-compass"></i>
            </div>
            <div class="doc-content">
              <h3 data-i18n="pcrDesign.title"><!-- i18n: pcr design title --></h3>
              <p data-i18n="pcrDesign.desc"><!-- i18n: pcr design desc --></p>
              <button type="button" class="button button-outline pdf-viewer-btn" data-pdf="../static/resources/bio/pcr_design.pdf" data-i18n="viewDesign">实验设计</button>
            </div>
          </div>
          <div class="doc-card">
            <div class="doc-icon">
              <i class="fas fa-clipboard-check"></i>
            </div>
            <div class="doc-content">
              <h3 data-i18n="pcrReport.title"><!-- i18n: pcr report title --></h3>
              <p data-i18n="pcrReport.desc"><!-- i18n: pcr report desc --></p>
              <button type="button" class="button pdf-viewer-btn" data-pdf="../static/resources/bio/pcr_report.pdf" data-i18n="viewReport">实验报告</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="thesis-archive">
      <div class="section-header">
        <h2 data-i18n="thesis.title"><!-- i18n: thesis title --></h2>
        <p data-i18n="thesis.subtitle"><!-- i18n: thesis subtitle --></p>
      </div>
      <div class="thesis-featured">
        <article class="thesis-card thesis-published thesis-with-image">
          <div class="thesis-image-wrap">
            <img src="../static/resources/bio/prion.jpeg" alt="朊病毒蛋白论文" loading="lazy">
          </div>
          <div class="thesis-body">
            <div class="thesis-header">
              <span class="thesis-badge" data-i18n="thesis.published"><!-- i18n: thesis published --></span>
              <span class="thesis-date">2026.03.15</span>
            </div>
            <h3 data-i18n="thesisPrion.title"><!-- i18n: thesis prion title --></h3>
            <p class="thesis-abstract" data-i18n="thesisPrion.abstract"><!-- i18n: thesis prion abstract --></p>
            <div class="thesis-actions">
              <button type="button" class="button pdf-viewer-btn" data-pdf="../static/resources/bio/prion.pdf" data-i18n="readPaper">阅读论文</button>
            </div>
          </div>
        </article>
      </div>
      <div class="thesis-grid">
        <article class="thesis-card thesis-draft thesis-with-image">
          <div class="thesis-image-wrap">
            <img src="../static/resources/bio/c3.png" alt="C3植物光合作用论文" loading="lazy">
          </div>
          <div class="thesis-body">
            <div class="thesis-header">
              <span class="thesis-badge" data-i18n="thesis.draft"><!-- i18n: thesis draft --></span>
              <span class="thesis-date">2026.03.10</span>
            </div>
            <h3 data-i18n="thesisC3.title"><!-- i18n: thesis c3 title --></h3>
            <p class="thesis-abstract" data-i18n="thesisC3.abstract"><!-- i18n: thesis c3 abstract --></p>
            <div class="thesis-actions">
              <button type="button" class="button button-outline pdf-viewer-btn" data-pdf="../static/resources/bio/c3.pdf" data-i18n="viewDraft">查看草稿</button>
            </div>
          </div>
        </article>
        <article class="thesis-card thesis-draft thesis-with-image">
          <div class="thesis-image-wrap">
            <img src="../static/resources/bio/saccharomyces.jpg" alt="酿酒酵母橙色平板实验论文" loading="lazy">
          </div>
          <div class="thesis-body">
            <div class="thesis-header">
              <span class="thesis-badge" data-i18n="thesis.draft"><!-- i18n: thesis draft --></span>
              <span class="thesis-date">2026.03.08</span>
            </div>
            <h3 data-i18n="thesisSaccharomyces.title"><!-- i18n: thesis saccharomyces title --></h3>
            <p class="thesis-abstract" data-i18n="thesisSaccharomyces.abstract"><!-- i18n: thesis saccharomyces abstract --></p>
            <div class="thesis-actions">
              <button type="button" class="button button-outline pdf-viewer-btn" data-pdf="../static/resources/bio/saccharomyces.pdf" data-i18n="viewDraft">查看草稿</button>
            </div>
          </div>
        </article>
      </div>
    </section>

    <section class="hero-interactive">
      <div class="interactive-content">
        <div class="interactive-image">
          <img src="../static/resources/bio/agrobacterium.jpg" alt="农杆菌转化示意图" loading="lazy">
          <div class="image-frame"></div>
        </div>
        <div class="interactive-text">
          <h1 data-i18n="interactive.title"><!-- i18n: interactive title --></h1>
          <p class="interactive-desc" data-i18n="interactive.desc"><!-- i18n: interactive desc --></p>
          <a class="button button-large" href="gene.html" data-i18n="interactive.button"><!-- i18n: interactive button --></a>
        </div>
      </div>
    </section>
  </main>

  <div class="pdf-modal" id="pdfModal">
    <div class="pdf-modal-header">
      <span class="pdf-modal-title" id="pdfModalTitle"></span>
      <div class="pdf-modal-controls">
        <button type="button" class="pdf-ctrl-btn" id="pdfPrev" title="上一页"><i class="fas fa-chevron-left"></i></button>
        <span class="pdf-page-info"><span id="pdfCurrentPage">1</span> / <span id="pdfTotalPages">1</span></span>
        <button type="button" class="pdf-ctrl-btn" id="pdfNext" title="下一页"><i class="fas fa-chevron-right"></i></button>
        <button type="button" class="pdf-ctrl-btn" id="pdfZoomOut" title="缩小"><i class="fas fa-search-minus"></i></button>
        <button type="button" class="pdf-ctrl-btn" id="pdfZoomIn" title="放大"><i class="fas fa-search-plus"></i></button>
        <a class="pdf-ctrl-btn pdf-download-btn" id="pdfDownload" title="下载"><i class="fas fa-download"></i></a>
        <button type="button" class="pdf-ctrl-btn pdf-close-btn" id="pdfClose" title="关闭"><i class="fas fa-times"></i></button>
      </div>
    </div>
    <div class="pdf-modal-body">
      <canvas id="pdfCanvas"></canvas>
    </div>
