<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenHarmony Hi3861</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
</head>
<body>
  <div id="particles-js"></div>
  <main class="page">
    <header class="topbar">
      <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 返回主页</a>
      <a class="home-link" href="../index.html#projects">回到项目区</a>
    </header>

    <section class="hero-card">
      <h1>OpenHarmony Hi3861</h1>
      <p>基于 OpenHarmony Hi3861 的嵌入式开发实践，探索设备端能力与系统工程。</p>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>嵌入式开发</h2>
        <p>Hi3861 芯片开发实践，从底层逻辑理解设备端能力与系统架构。</p>
      </article>

      <article class="card">
        <h2>持续更新中</h2>
        <p>更多内容正在建设中，敬请期待。</p>
      </article>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 50, density: { enable: true, value_area: 1000 } },
        color: { value: '#6366f1' },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true },
        size: { value: 2.8, random: true },
        line_linked: { enable: true, distance: 140, color: '#6366f1', opacity: 0.12, width: 1 },
        move: { enable: true, speed: 1.0, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
      },
      interactivity: {
        detect_on: 'canvas',
        events: { onhover: { enable: false }, onclick: { enable: false } }
      }
    });
  </script>
</body>
</html>
