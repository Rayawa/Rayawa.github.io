<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生物相关项目</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
</head>
<body>
  <div id="particles-js"></div>
  <main class="page">
    <header class="topbar">
      <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 返回主页</a>
      <a class="home-link" href="../index.html#projects">回到项目区</a>
    </header>

    <section class="hero-card">
      <h1>生物相关项目</h1>
      <p>该页面集中展示生物方向模块：蛋白质猜想、PCR 工程、光合作用、橙色平板实验与农杆菌转化法网页。</p>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>蛋白质猜想</h2>
        <p>用于演示蛋白质结构和功能关系的假设推演模块，支持从序列到结构的直观展示。</p>
      </article>

      <article class="card">
        <h2>PCR 工程</h2>
        <p>展示 PCR 扩增流程、温度循环逻辑与结果分析，适用于教学与交互式模拟。</p>
      </article>

      <article class="card">
        <h2>光合作用</h2>
        <p>按阶段展示光反应与暗反应过程，通过可视化参数解释能量转化机制。</p>
      </article>

      <article class="card">
        <h2>橙色平板实验</h2>
        <p>记录实验步骤、观察现象与对照数据，方便后续复盘与方案迭代。</p>
      </article>

      <article class="card">
        <h2>农杆菌转化法网页</h2>
        <p>将农杆菌转化法实验流程做成网页化展示，便于教学演示、过程理解与在线复查。</p>
        <div class="single-action">
          <a class="button" href="https://gene.rayawa.top" target="_blank" rel="noopener">打开农杆菌转化法网页</a>
        </div>
      </article>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 50, density: { enable: true, value_area: 1000 } },
        color: { value: '#6366f1' },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true },
        size: { value: 2.8, random: true },
        line_linked: { enable: true, distance: 140, color: '#6366f1', opacity: 0.12, width: 1 },
        move: { enable: true, speed: 1.0, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
      },
      interactivity: {
        detect_on: 'canvas',
        events: { onhover: { enable: false }, onclick: { enable: false } }
      }
    });
  </script>
</body>
</html>
