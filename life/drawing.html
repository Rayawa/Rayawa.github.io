<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>绘画作品 | Ray Chen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/common.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
  <style>
    .page {
      max-width: 1200px;
      padding-left: clamp(1.2rem, 4vw, 2.5rem);
      padding-right: clamp(1.2rem, 4vw, 2.5rem);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-top: 2rem;
      padding-bottom: 3rem;
    }
    .artwork-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease, border-color 0.4s ease;
      cursor: pointer;
    }
    .artwork-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(99, 102, 241, 0.12);
      border-color: rgba(99, 102, 241, 0.35);
    }
    .artwork-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(16, 185, 129, 0.04));
    }
    .artwork-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .artwork-card:hover .artwork-image-wrap img {
      transform: scale(1.05);
    }
    .artwork-info {
      padding: 1.25rem 1.5rem 1.5rem;
    }
    .artwork-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }
    .artwork-date {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.45);
      font-family: 'JetBrains Mono', monospace;
    }

    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }
    @media (max-width: 600px) {
      .page {
        max-width: 100%;
      }
      .gallery-grid {
        gap: 1.2rem;
        margin-top: 1.5rem;
      }
      .artwork-info {
        padding: 1rem 1.2rem 1.2rem;
      }
      .artwork-title {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>
  <div id="site-navbar"></div>
  <script src="../static/js/navbar.js"></script>
  <div id="particles-js"></div>
  <main class="page">
    <section class="hero-card subpage-reveal">
      <h1>绘画作品</h1>
      <p>用画笔记录灵感与想象</p>
    </section>

    <div class="gallery-grid subpage-reveal">

      <div class="artwork-card">
        <div class="artwork-image-wrap">
          <img src="../static/resources/drawing/yanfei.jpg" alt="烟绯" loading="lazy">
        </div>
        <div class="artwork-info">
          <div class="artwork-title">烟绯</div>
          <div class="artwork-date">2025-01-15</div>
        </div>
      </div>

      <div class="artwork-card">
        <div class="artwork-image-wrap">
          <img src="../static/resources/drawing/yanfei-avatar.jpg" alt="烟绯头像" loading="lazy">
        </div>
        <div class="artwork-info">
          <div class="artwork-title">烟绯头像</div>
          <div class="artwork-date">2025-01-18</div>
        </div>
      </div>

      <div class="artwork-card">
        <div class="artwork-image-wrap">
          <img src="../static/resources/drawing/huaisuli.jpg" alt="怀黍离" loading="lazy">
        </div>
        <div class="artwork-info">
          <div class="artwork-title">怀黍离</div>
          <div class="artwork-date">2025-02-03</div>
        </div>
      </div>

      <div class="artwork-card">
        <div class="artwork-image-wrap">
          <img src="../static/resources/drawing/xiaogong-1.jpg" alt="宵宫1" loading="lazy">
        </div>
        <div class="artwork-info">
          <div class="artwork-title">宵宫 1</div>
          <div class="artwork-date">2025-02-10</div>
        </div>
      </div>

      <div class="artwork-card">
        <div class="artwork-image-wrap">
          <img src="../static/resources/drawing/xiaogong-2.jpg" alt="宵宫2" loading="lazy">
        </div>
        <div class="artwork-info">
          <div class="artwork-title">宵宫 2</div>
          <div class="artwork-date">2025-02-14</div>
        </div>
      </div>

      <div class="artwork-card">
        <div class="artwork-image-wrap">
          <img src="../static/resources/drawing/xiaogong-3.jpg" alt="宵宫3" loading="lazy">
        </div>
        <div class="artwork-info">
          <div class="artwork-title">宵宫 3</div>
          <div class="artwork-date">2025-02-20</div>
        </div>
      </div>

      <div class="artwork-card">
        <div class="artwork-image-wrap">
          <img src="../static/resources/drawing/xiaogong-4.jpg" alt="宵宫4" loading="lazy">
        </div>
        <div class="artwork-info">
          <div class="artwork-title">宵宫 4</div>
          <div class="artwork-date">2025-03-01</div>
        </div>
      </div>

    </div>
  </main>
  <div id="site-footer"></div>

  <script src="static/i18n/i18n-loader.js"></script>
    <script>I18nLoader.init('drawing');</script>
  <script src="../static/js/footer.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="../static/js/common.js"></script>
</body>
</html>
