<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鸿蒙应用看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
</head>
<body>
  <div id="particles-js"></div>
  <main class="page">
    <header class="topbar">
      <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 返回主页</a>
      <a class="home-link" href="../index.html#projects">回到项目区</a>
    </header>

    <section class="hero-card">
      <h1>鸿蒙应用看板</h1>
      <p>欢迎来到应用看板页面，这里会持续更新版本信息、功能进展与平台发布状态。</p>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>欢迎</h2>
        <p>这是应用看板项目的独立介绍页，集中展示项目目标、当前阶段以及后续迭代节奏。</p>
      </article>

      <article class="card">
        <h2>项目介绍</h2>
        <p>项目聚焦鸿蒙应用市场数据采集与展示，围绕统一体验构建网页端和多平台版本。</p>
      </article>
    </section>

    <section class="hero-card">
      <h2>下载链接</h2>
      <div class="button-row">
        <a class="button" href="https://hmos.rayawa.top" target="_blank" rel="noopener">网页</a>
        <a class="button" href="https://hmos.rayawa.top" target="_blank" rel="noopener">鸿蒙</a>
        <a class="button" href="https://hmos.rayawa.top" target="_blank" rel="noopener">苹果</a>
        <a class="button" href="https://hmos.rayawa.top" target="_blank" rel="noopener">安卓</a>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 50, density: { enable: true, value_area: 1000 } },
        color: { value: '#6366f1' },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true },
        size: { value: 2.8, random: true },
        line_linked: { enable: true, distance: 140, color: '#6366f1', opacity: 0.12, width: 1 },
        move: { enable: true, speed: 1.0, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
      },
      interactivity: {
        detect_on: 'canvas',
        events: { onhover: { enable: false }, onclick: { enable: false } }
      }
    });
  </script>
</body>
</html>
