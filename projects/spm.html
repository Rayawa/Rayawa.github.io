<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sweet Potato Mod</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
</head>
<body>
  <div id="particles-js"></div>
  <main class="page">
    <header class="topbar">
      <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> 返回主页</a>
      <a class="home-link" href="../index.html#projects">回到项目区</a>
    </header>

    <section class="hero-card">
      <h1>Sweet Potato Mod</h1>
      <p>与 @teddyxlandlee 协作开发的 Minecraft 模组，围绕农业玩法、成长机制与魔法元素持续迭代。</p>
      <div class="single-action">
        <a class="button" href="https://featurehouse.github.io" target="_blank" rel="noopener">访问项目主页</a>
      </div>
    </section>

    <section class="card-grid">
      <article class="card">
        <h2>当前状态</h2>
        <p>当前页面用于承载模块文档与更新日志，后续会补充版本说明、改动细节和下载指引。</p>
      </article>
      <article class="card">
        <h2>协作信息</h2>
        <p>项目持续进行中，面向开源协作；欢迎通过主页链接查看代码仓库与发布信息。</p>
      </article>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 50, density: { enable: true, value_area: 1000 } },
        color: { value: '#6366f1' },
        shape: { type: 'circle' },
        opacity: { value: 0.35, random: true },
        size: { value: 2.8, random: true },
        line_linked: { enable: true, distance: 140, color: '#6366f1', opacity: 0.12, width: 1 },
        move: { enable: true, speed: 1.0, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
      },
      interactivity: {
        detect_on: 'canvas',
        events: { onhover: { enable: false }, onclick: { enable: false } }
      }
    });
  </script>
</body>
</html>
