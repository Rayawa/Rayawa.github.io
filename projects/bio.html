<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生物相关项目</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/common.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="../index.html" class="logo"><i class="fas fa-code"></i> <span data-i18n="nav.home"><!-- i18n: logo text --></span></a>
      <div class="language-switch">
        <button type="button" class="lang-btn active" data-lang="zh"><img src="../static/cn.svg" alt="" class="lang-flag"><span>中文</span></button>
        <button type="button" class="lang-btn" data-lang="en"><img src="../static/uk.svg" alt="" class="lang-flag"><span>EN</span></button>
        <button type="button" class="lang-btn" data-lang="fr"><img src="../static/fr.svg" alt="" class="lang-flag"><span>FR</span></button>
      </div>
    </div>
  </nav>
  <div id="particles-js"></div>
  <main class="page">
    <header class="topbar">
      <a class="back-link" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-i18n="back"><!-- i18n: back link --></span></a>
      <a class="home-link" href="../index.html#projects" data-i18n="projects"><!-- i18n: projects link --></a>
    </header>
    <section class="hero-card">
      <h1 data-i18n="title"><!-- i18n: page title --></h1>
      <p data-i18n="desc"><!-- i18n: page description --></p>
    </section>
    <section class="card-grid">
      <article class="card">
        <h2 data-i18n="protein.title"><!-- i18n: protein title --></h2>
        <p data-i18n="protein.desc"><!-- i18n: protein desc --></p>
      </article>
      <article class="card">
        <h2 data-i18n="pcr.title"><!-- i18n: pcr title --></h2>
        <p data-i18n="pcr.desc"><!-- i18n: pcr desc --></p>
      </article>
      <article class="card">
        <h2 data-i18n="photosynthesis.title"><!-- i18n: photosynthesis title --></h2>
        <p data-i18n="photosynthesis.desc"><!-- i18n: photosynthesis desc --></p>
      </article>
      <article class="card">
        <h2 data-i18n="orange.title"><!-- i18n: orange plate title --></h2>
        <p data-i18n="orange.desc"><!-- i18n: orange plate desc --></p>
      </article>
      <article class="card">
        <h2 data-i18n="agrobacterium.title"><!-- i18n: agrobacterium title --></h2>
        <p data-i18n="agrobacterium.desc"><!-- i18n: agrobacterium desc --></p>
        <div class="single-action">
          <a class="button" href="https://gene.rayawa.top" target="_blank" rel="noopener" data-i18n="agrobacteriumBtn"><!-- i18n: agrobacterium button --></a>
        </div>
      </article>
    </section>
  </main>
  <div class="fab-tools">
    <button class="fab-btn refresh-btn" aria-label="刷新页面"><i class="fas fa-sync-alt"></i></button>
    <button class="fab-btn top-btn" aria-label="回到顶部"><i class="fas fa-arrow-up"></i></button>
  </div>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="../static/js/i18n-bio.js"></script>
  <script src="../static/js/common.js"></script>
</body>
</html>
