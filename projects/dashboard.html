<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>华为应用市场看板 | Ray Chen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/common.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
  <link rel="stylesheet" href="../static/css/dashboard.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container nav-container">
      <a href="../index.html" class="logo"><i class="fas fa-code"></i> <span data-i18n="navTitle"></span></a>
      <ul class="nav-links">
        <li><a href="../index.html" data-i18n="nav.home"></a></li>
        <li><a href="../index.html#about" data-i18n="nav.about"></a></li>
        <li><a href="../index.html#projects" data-i18n="nav.projects"></a></li>
        <li><a href="../index.html#gallery" data-i18n="nav.gallery"></a></li>
        <li><a href="../index.html#contact" data-i18n="nav.contact"></a></li>
      </ul>
      <div class="language-switch">
        <button type="button" class="lang-btn" data-lang="zh"><img src="../static/resources/cn.svg" alt="" class="lang-flag"><span>中文</span></button>
        <button type="button" class="lang-btn" data-lang="en"><img src="../static/resources/uk.svg" alt="" class="lang-flag"><span>EN</span></button>
        <button type="button" class="lang-btn" data-lang="fr"><img src="../static/resources/fr.svg" alt="" class="lang-flag"><span>FR</span></button>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div id="particles-js"></div>

  <main class="page dashboard-page">
    <!-- 第一部分：标题、图标和下载链接 -->
    <section class="hero-section">
      <div class="hero-header">
        <div class="app-icon-wrapper">
          <img src="../static/resources/dashboard/app_icon.png" alt="App Icon" class="app-icon">
        </div>
        <div class="hero-text">
          <h1 data-i18n="hero.title" class="hero-title"></h1>
          <div class="hero-tags">
            <span class="hero-tag" data-i18n="hero.tagWeb"></span>
            <span class="hero-tag" data-i18n="hero.tagHarmony"></span>
            <span class="hero-tag" data-i18n="hero.tagAward"></span>
          </div>
        </div>
      </div>
      
      <div class="download-links">
        <div class="platform-grid">
          <a class="platform-btn platform-web" href="http://shenjack.top:10003/dashboard" target="_blank" rel="noopener">
            <span class="platform-icon-wrap">
              <img class="platform-icon-img" data-platform-icon="web" alt="">
            </span>
            <span class="platform-main" data-i18n="access.sSite"></span>
          </a>
          <a class="platform-btn platform-web" href="https://hmos.txit.top/dashboard" target="_blank" rel="noopener">
            <span class="platform-icon-wrap">
              <img class="platform-icon-img" data-platform-icon="web" alt="">
            </span>
            <span class="platform-main" data-i18n="access.tSite"></span>
          </a>
          <a class="platform-btn platform-primary" href="https://appgallery.huawei.com/link/invite-test-wap?taskId=a1298ba466be643117821e490077e117&invitationCode=8KtFf8LLNeb" target="_blank" rel="noopener">
            <span class="platform-icon-wrap">
              <img class="platform-icon-img" data-platform-icon="harmony" alt="">
            </span>
            <span class="platform-main" data-i18n="access.harmony"></span>
          </a>
          <button class="platform-btn platform-disabled platform-android" type="button" aria-disabled="true">
            <span class="platform-icon-wrap">
              <img class="platform-icon-img" data-platform-icon="android" alt="">
            </span>
            <span class="platform-main" data-i18n="access.android"></span>
          </button>
          <button class="platform-btn platform-disabled platform-ios" type="button" aria-disabled="true">
            <span class="platform-icon-wrap">
              <img class="platform-icon-img" data-platform-icon="apple" alt="">
            </span>
            <span class="platform-main" data-i18n="access.ios"></span>
          </button>
        </div>
      </div>
    </section>

    <!-- 第二部分：数据展示 -->
    <section class="content-section">
      <div class="section-container metrics-container">
        <div class="metrics-grid" id="metricsGrid">
          <article class="metric-card">
            <div class="metric-label" data-i18n="metrics.totalViews.label"></div>
            <div class="metric-value" data-counter-key="totalViews" data-counter-fallback="2000000">0</div>
            <div class="metric-field">totalViews</div>
          </article>
          <article class="metric-card">
            <div class="metric-label" data-i18n="metrics.todayViews.label"></div>
            <div class="metric-value" data-counter-key="todayViews" data-counter-fallback="50000">0</div>
            <div class="metric-field">todayViews</div>
          </article>
          <article class="metric-card">
            <div class="metric-label" data-i18n="metrics.harmonyViews.label"></div>
            <div class="metric-value" data-counter-key="harmonyAppViews" data-counter-fallback="800000">0</div>
            <div class="metric-field">harmonyAppViews</div>
          </article>
        </div>
      </div>
    </section>

    <!-- 第三部分：详细信息 -->
    <section class="content-section">
      <div class="section-container">
        <div class="section-header">
          <h2 data-i18n="details.title"></h2>
          <p data-i18n="details.desc"></p>
        </div>

        <div class="details-grid">
          <div class="details-main">
            <div class="note-card">
              <div class="note-icon">⚠️</div>
              <h3 data-i18n="details.notes.title"></h3>
              <ul class="note-list">
                <li data-i18n="details.notes.li1"></li>
                <li data-i18n="details.notes.li2"></li>
                <li data-i18n="details.notes.li3"></li>
              </ul>
            </div>

            <div class="info-card">
              <div class="card-header">
                <span class="card-number">01</span>
                <h3 data-i18n="details.what.title"></h3>
              </div>
              <div class="card-body">
                <p data-i18n="details.what.p1"></p>
                <p data-i18n="details.what.p2"></p>
              </div>
            </div>

            <div class="info-card">
              <div class="card-header">
                <span class="card-number">02</span>
                <h3 data-i18n="details.usage.title"></h3>
              </div>
              <div class="card-body">
                <ul class="detail-list">
                  <li data-i18n="details.usage.li1"></li>
                  <li data-i18n="details.usage.li2"></li>
                  <li data-i18n="details.usage.li3"></li>
                  <li data-i18n="details.usage.li4"></li>
                  <li data-i18n="details.usage.li5"></li>
                </ul>
              </div>
            </div>
          </div>

          <aside class="details-sidebar">
            <div class="highlight-card harmony-card">
              <div class="highlight-icon">🎨</div>
              <h3 data-i18n="details.harmony.title"></h3>
              <p class="highlight-summary" data-i18n="details.harmony.summary"></p>
              <ul class="highlight-list">
                <li data-i18n="details.harmony.li1"></li>
                <li data-i18n="details.harmony.li2"></li>
                <li data-i18n="details.harmony.li3"></li>
                <li data-i18n="details.harmony.li4"></li>
                <li data-i18n="details.harmony.li5"></li>
              </ul>
            </div>

            <div class="qq-support-card">
              <div class="support-icon">💬</div>
              <div class="support-content">
                <h3>技术交流</h3>
                <p>欢迎加入 QQ 交流群</p>
                <a class="support-link" href="https://qm.qq.com/q/ux1dXhwhZ8" target="_blank" rel="noopener">加入 QQ 群</a>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="../static/js/i18n-dashboard.js"></script>
  <script src="../static/js/dashboard.js"></script>
  <script src="../static/js/i18n-footer.js"></script>
  <script src="../static/js/footer.js"></script>
  <script src="../static/js/common.js"></script>
</body>
</html>
