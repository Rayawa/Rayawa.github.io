<!DOCTYPE html>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/common.css">
  <link rel="stylesheet" href="../static/css/subpage.css">
</head>
<body>
  <!-- 导航栏组件 -->
<nav class="navbar" id="navbar">
    <div class="container nav-container">
        <a href="#" class="logo">
            <i class="fas fa-code"></i>
            <span>Ray Chen</span>
        </a>

        <ul class="nav-links">
            <li><a href="#">首页</a></li>
            <li><a href="#about">关于我</a></li>
            <li><a href="#projects">项目</a></li>
            <li><a href="#gallery">摄影</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>

        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</nav>
  <div id="particles-js"></div>
  <main class="page">
    <section class="hero-card">
      <h1></h1>
      <p></p>
    </section>

    <section class="pcr-lab">
      <div class="section-header">
        <h2></h2>
        <p></p>
      </div>
      <div class="pcr-content">
        <div class="pcr-result">
          <div class="gel-display">
            <div class="display-frame">
              <img src="../static/resources/bio/pcr.jpg" alt="PCR凝胶电泳结果" loading="lazy">
            </div>
            <div class="gel-caption"></div>
          </div>
        </div>
        <div class="pcr-docs">
          <div class="doc-card">
            <div class="doc-icon">
              <i class="fas fa-drafting-compass"></i>
            </div>
            <div class="doc-content">
              <h3></h3>
              <p></p>
              <div class="single-action">
                <a class="button button-outline" href="../static/resources/bio/pcr_design.pdf" target="_blank" rel="noopener">实验设计</a>
              </div>
            </div>
          </div>
          <div class="doc-card">
            <div class="doc-icon">
              <i class="fas fa-clipboard-check"></i>
            </div>
            <div class="doc-content">
              <h3></h3>
              <p></p>
              <div class="single-action">
                <a class="button" href="../static/resources/bio/pcr_report.pdf" target="_blank" rel="noopener">实验报告</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="thesis-archive">
      <div class="section-header">
        <h2></h2>
        <p></p>
      </div>
      <div class="thesis-featured">
        <article class="thesis-card thesis-published thesis-with-image">
          <div class="thesis-image-wrap">
            <img src="../static/resources/bio/prion.jpeg" alt="朊病毒蛋白论文" loading="lazy">
          </div>
          <div class="thesis-body">
            <div class="thesis-header">
              <span class="thesis-badge"></span>
              <span class="thesis-date">2024.6.23</span>
            </div>
            <h3></h3>
            <p class="thesis-abstract"></p>
            <div class="thesis-actions">
              <a class="button" href="../static/resources/bio/prion.pdf" target="_blank" rel="noopener">阅读论文</a>
            </div>
          </div>
        </article>
      </div>
      <div class="thesis-grid">
        <article class="thesis-card thesis-draft thesis-with-image">
          <div class="thesis-image-wrap">
            <img src="../static/resources/bio/c3.png" alt="C3植物光合作用论文" loading="lazy">
          </div>
          <div class="thesis-body">
            <div class="thesis-header">
              <span class="thesis-badge"></span>
              <span class="thesis-date">2024.6.8</span>
            </div>
            <h3></h3>
            <p class="thesis-abstract"></p>
            <div class="thesis-actions">
              <a class="button button-outline" href="../static/resources/bio/c3.pdf" target="_blank" rel="noopener">查看草稿</a>
            </div>
          </div>
        </article>
        <article class="thesis-card thesis-draft thesis-with-image">
          <div class="thesis-image-wrap">
            <img src="../static/resources/bio/saccharomyces.jpg" alt="酿酒酵母橙色平板实验论文" loading="lazy">
          </div>
          <div class="thesis-body">
            <div class="thesis-header">
              <span class="thesis-badge"></span>
              <span class="thesis-date">2026.03.08</span>
            </div>
            <h3></h3>
            <p class="thesis-abstract"></p>
            <div class="thesis-actions">
              <a class="button button-outline" href="../static/resources/bio/saccharomyces.pdf" target="_blank" rel="noopener">查看草稿</a>
            </div>
          </div>
        </article>
      </div>
    </section>

    <section class="hero-interactive">
      <div class="interactive-content">
        <div class="interactive-image">
          <img src="../static/resources/bio/agrobacterium.jpg" alt="农杆菌转化示意图" loading="lazy">
          <div class="image-frame"></div>
        </div>
        <div class="interactive-text">
          <h1></h1>
          <p class="interactive-desc"></p>
          <a class="button button-large" href="gene.html"></a>
        </div>
      </div>
    </section>
  </main>
    <div id="site-footer"></div>

  <script src="../static/js/footer.js"></script>
    <script src="../static/js/common.js"></script>

</html>
