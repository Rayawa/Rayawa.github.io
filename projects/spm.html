  <style>
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .feature-card {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      padding: 1.2rem;
      transition: var(--transition);
    }

    .feature-card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 102, 241, 0.6);
    }

    .feature-card img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .feature-card-text h3 {
      font-size: 1rem;
      margin-bottom: 0.4rem;
    }

    .feature-card-text h3 a {
      color: var(--primary);
      text-decoration: none;
    }

    .feature-card-text h3 a:hover {
      text-decoration: underline;
    }

    .feature-card-text p {
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.6;
      font-size: 0.88rem;
    }

    .dev-section {
      margin-top: 1rem;
    }

    .dev-section h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .dev-list {
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.8;
      font-size: 0.9rem;
      padding-left: 1rem;
      border-left: 2px solid rgba(99, 102, 241, 0.3);
    }

    .notice-list {
      list-style: none;
      padding: 0;
    }

    .notice-list li {
      position: relative;
      padding-left: 1.2rem;
      margin-bottom: 0.6rem;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.65;
      font-size: 0.9rem;
    }

    .notice-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--primary);
    }

    .hero-image {
      width: 100%;
      max-width: 600px;
      border-radius: 10px;
      margin: 1rem 0;
      border: 1px solid var(--glass-border);
    }

    @media (max-width: 900px) {
      .feature-grid {
        grid-template-columns: 1fr;
      }

      .feature-card img {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>
